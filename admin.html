<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin World of Cigar</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:30px;
}

h1{
    color:gold;
    text-align:center;
}

.form{
    max-width:400px;
    margin:30px auto;
    background:#222;
    padding:25px;
    border:1px solid gold;
    border-radius:10px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#333;
    color:white;
    border:1px solid #555;
}

button{
    width:100%;
    padding:12px;
    background:gold;
    border:none;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>ADMIN WORLD OF CIGAR</h1>

<div class="form">

<input type="file">

<input type="text" placeholder="Merk Cerutu">

<input type="text" placeholder="Nama Produk">

<input type="number" placeholder="Harga">

<textarea placeholder="Deskripsi"></textarea>

<button>
Tambah Produk
</button>

</div>

</body>
</html>
